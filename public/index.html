<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡皮订阅 — AI 资讯阅读器</title>
  <meta name="description" content="云端 RSS 阅读器，注重移动端阅读体验，支持稍后阅读、收藏与多端同步。">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css?v=9?v=9">
</head>
<body>
  <!-- ===== Header ===== -->
  <header class="app-header" id="app-header">
    <div class="header-left">
      <button class="icon-btn sidebar-toggle" id="sidebar-toggle" aria-label="切换侧栏">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <a href="/" class="logo" id="logo">
        <svg width="24" height="24" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="14" r="3" fill="#f97316"/><circle cx="16" cy="14" r="6" stroke="#f97316" stroke-width="2" fill="none" stroke-dasharray="3 3"/><circle cx="16" cy="14" r="9.5" stroke="#f97316" stroke-width="1.5" fill="none" opacity=".6"/><rect x="14" y="20" width="4" height="6" rx="2" fill="#f97316"/></svg>
        <span>卡皮订阅</span>
      </a>
    </div>
    <div class="header-right">
      <button class="icon-btn theme-toggle" id="theme-toggle" aria-label="切换主题" title="切换主题">
        <!-- Sun icon -->
        <svg class="icon-sun" style="display:none" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <!-- Moon icon -->
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="icon-btn" id="btn-search" aria-label="搜索" title="搜索">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      </button>
      <div class="user-area dropdown" id="user-area" style="display:none; position: relative;">
        <button class="btn btn-ghost user-name" id="user-name" aria-haspopup="true" aria-expanded="false" style="padding:4px 8px; font-weight: normal; display: flex; align-items: center; gap: 4px;">
          <span id="user-name-text">用户</span>
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" style="opacity: 0.5; margin-top: 1px;"><path d="M8 11L3 6h10z"/></svg>
        </button>
        <div class="dropdown-menu" id="user-dropdown" style="display:none;">
          <button class="dropdown-item" id="btn-admin" style="display:none;">
            <span>🔧</span>
            <span>审核 (<span id="admin-count">0</span>)</span>
          </button>
          <div style="height: 1px; background: var(--border); margin: 4px 0;"></div>
          <button class="dropdown-item text-danger" id="btn-logout">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            退出登录
          </button>
        </div>
      </div>
      <div class="guest-area" id="guest-area">
        <button class="btn btn-primary" id="btn-login">登录</button>
      </div>
    </div>
  </header>

  <!-- ===== Mobile Tab Bar (mobile only) ===== -->
  <nav class="mobile-tabs" id="mobile-tabs" style="display:none">
    <button class="tab-btn active" data-tab="latest" id="tab-latest">最新</button>
    <button class="tab-btn" data-tab="read" id="tab-read">已阅读</button>
    <button class="tab-btn" data-tab="later" id="tab-later">稍后阅读</button>
    <button class="tab-btn" data-tab="favorites" id="tab-favorites">收藏</button>
  </nav>

  <!-- ===== Main Layout ===== -->
  <main class="app-main" id="app-main">
    <!-- Sidebar: Subscription list -->
    <aside class="sidebar" id="sidebar">
      <!-- PC Categories -->
      <div class="pc-categories" id="pc-categories" style="list-style: none; padding: 0; margin: 0;">
        <div class="feed-item active" data-tab="latest" id="pc-cat-latest">
          <span class="feed-name">最新</span>
        </div>
        <div class="feed-item" data-tab="read" id="pc-cat-read">
          <span class="feed-name">已阅读</span>
        </div>
        <div class="feed-item" data-tab="later" id="pc-cat-later">
          <span class="feed-name">稍后阅读</span>
        </div>
        <div class="feed-item" data-tab="favorites" id="pc-cat-favorites">
          <span class="feed-name">收藏</span>
        </div>
      </div>

      <!-- Subscription list -->
      <div class="feed-list" id="feed-list" style="margin-top: var(--space-sm);">
        <div class="feed-item active" data-feed="all" id="feed-all">
          <span class="feed-icon">📰</span>
          <span class="feed-name">全部文章</span>
          <button class="feed-refresh" title="刷新文章" aria-label="刷新">
            <svg width="14" height="14" viewBox="0 0 18 18" fill="none"><path d="M14.5 9a5.5 5.5 0 11-1.6-3.9M14.5 3v2.1h-2.1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>


      <!-- Footer Actions -->
      <div class="sidebar-footer" style="display: flex; gap: var(--space-sm);">
        <button class="btn btn-ghost" id="btn-add-feed" style="flex: 1; padding: var(--space-sm); font-size: var(--text-sm);">
          <svg width="14" height="14" viewBox="0 0 18 18" fill="none" style="margin-right: 4px;"><path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          添加订阅
        </button>
        <button class="btn btn-ghost" id="btn-explore-pool" style="flex: 1; padding: var(--space-sm); font-size: var(--text-sm);">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style="margin-right: 4px;"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v6M5 8h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          订阅管理
        </button>
      </div>
    </aside>

    <!-- Feed: Article list -->
    <section class="feed-column" id="feed-column">

      <div class="article-list" id="article-list">
        <div class="empty-state" id="article-empty">
          <p>暂无文章</p>
          <p class="text-muted">选择左侧订阅源，或添加新的 RSS 订阅</p>
        </div>
      </div>
      <!-- Mobile pagination -->
      <div class="pagination" id="pagination" style="display:none">
        <button class="btn btn-ghost" id="btn-prev-page" disabled>上一页</button>
        <span class="page-info" id="page-info">1 / 1</span>
        <button class="btn btn-ghost" id="btn-next-page">下一页</button>
      </div>
      <!-- Mark all read -->
      <div class="mark-all-read" id="mark-all-read" style="display:none">
        <button class="btn btn-primary btn-block" id="btn-mark-all-read">✓ 标记本页已读并刷新</button>
      </div>
    </section>

    <!-- Reader: Article content -->
    <section class="reader-pane" id="reader-pane">
      <div class="reader-empty" id="reader-empty">
        <div class="reader-empty-icon">📖</div>
        <p>选择一篇文章开始阅读</p>
      </div>
      <article class="reader-content" id="reader-content" style="display:none">
        <div class="reader-header">
          <h1 id="reader-title"></h1>
          <div class="reader-meta">
            <span id="reader-author"></span>
            <span id="reader-date"></span>
            <a id="reader-link" href="#" target="_blank" rel="noopener">查看原文 ↗</a>
          </div>
          <div class="reader-actions">
            <button class="action-btn" id="action-read" title="标记已读" data-action="read">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8l4 4 8-8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="action-btn" id="action-later" title="稍后阅读" data-action="later">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v3l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
            <button class="action-btn" id="action-fav" title="收藏" data-action="fav">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2l1.8 3.6L14 6.3l-3 2.9.7 4.1L8 11.4 4.3 13.3l.7-4.1-3-2.9 4.2-.7z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
            </button>
            <button class="action-btn" id="action-share" title="转发" data-action="share">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 9v4h8V9M8 2v8M5 5l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>
        <div class="reader-body" id="reader-body"></div>
      </article>
    </section>
  </main>

  <!-- ===== Guest Landing (shown when not logged in) ===== -->
  <div class="guest-landing" id="guest-landing" style="display:none">
    <div class="guest-columns">
      <section class="guest-col">
        <h2>最新资讯</h2>
        <div class="guest-list" id="guest-latest"></div>
      </section>
      <section class="guest-col">
        <h2>精选收藏</h2>
        <div class="guest-list" id="guest-favorites"></div>
      </section>
    </div>
  </div>

  <!-- ===== Resource Pool Modal ===== -->
  <dialog class="modal modal-xl modal-sharp" id="pool-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>订阅管理 <span class="pool-modal-hint">(退订后保留30分钟数据，防误删)</span></h2>
        <button class="icon-btn modal-close" id="pool-modal-close" aria-label="关闭">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 4l10 10M14 4L4 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body" id="pool-list"></div>
      <div class="modal-footer" id="pool-pagination" style="display: none; padding: var(--space-md); border-top: 1px solid var(--border);"></div>
    </div>
  </dialog>

  <!-- ===== Admin Panel Modal ===== -->
  <dialog class="modal" id="admin-modal">
    <div class="modal-content modal-lg">
      <div class="modal-header">
        <h2>🔧 管理员审核</h2>
        <button class="icon-btn modal-close" id="admin-modal-close" aria-label="关闭">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 4l10 10M14 4L4 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body" id="admin-list"></div>
    </div>
  </dialog>

  <!-- ===== Confirm Dialog ===== -->
  <dialog class="modal modal-sm" id="confirm-dialog">
    <div class="modal-content">
      <p id="confirm-message">确定要执行此操作吗？</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="confirm-cancel">取消</button>
        <button class="btn btn-danger" id="confirm-ok">确定</button>
      </div>
    </div>
  </dialog>

  <dialog class="modal modal-xl modal-sharp" id="add-feed-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>添加订阅</h2>
        <button class="icon-btn modal-close" id="add-feed-modal-close" aria-label="关闭">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 4l10 10M14 4L4 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="add-feed-form">
        <input type="url" id="feed-url-input" placeholder="输入 RSS 订阅链接…" autocomplete="off" style="width:100%; padding:var(--space-sm) var(--space-md); margin-bottom:var(--space-md); border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--bg-primary); color:var(--text-primary); font-family:var(--font-sans); font-size:var(--text-base);">
        <p class="form-hint" id="feed-form-hint"></p>
        <div class="modal-actions">
          <input type="file" id="opml-file-input" accept=".opml,text/xml,application/xml" style="display:none;">
          <button class="btn btn-ghost" id="btn-import-opml" style="margin-right: auto;">导入 OPML</button>
          
          <button class="btn btn-ghost" id="btn-cancel-feed">取消</button>
          <button class="btn btn-primary" id="btn-submit-feed">添加</button>
        </div>
      </div>
    </div>
  </dialog>

  <!-- ===== Search Modal ===== -->
  <dialog class="modal modal-xl modal-sharp" id="search-modal">
    <div class="modal-content" style="max-height: 80vh; display: flex; flex-direction: column;">
      <div class="modal-header" style="border-bottom: 0px;">
        <form id="search-form" style="flex: 1; display: flex; gap: var(--space-sm); margin-right: var(--space-md); min-width: 0;">
          <input type="search" id="search-input" placeholder="输入关键字搜索全文..." autocomplete="off" style="flex: 1; min-width: 0; padding: var(--space-sm) var(--space-md); border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-surface); color: var(--text-primary); font-family: var(--font-sans); font-size: var(--text-base);">
          <button type="submit" class="btn btn-primary" id="btn-submit-search">搜索</button>
        </form>
        <button class="icon-btn modal-close" id="search-modal-close" aria-label="关闭">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 4l10 10M14 4L4 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body" id="search-results" style="flex: 1; overflow-y: auto; padding: 0;">
        <div class="empty-state" id="search-empty-state"><p style="white-space: nowrap; font-size: var(--text-base);">输入关键字开始检索资讯</p></div>
      </div>
      <div class="modal-footer" id="search-pagination" style="display: none; padding: var(--space-md); border-top: 1px solid var(--border);"></div>
    </div>
  </dialog>

  <!-- ===== Toast Notifications ===== -->
  <div class="toast-container" id="toast-container" popover="manual"></div>

  <!-- Scripts -->
  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_live_Y2xlcmsua2FwaWJhbGEuaWN1JA"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
  ></script>
  <script src="/js/store.js?v=2"></script>
  <script src="/js/api.js?v=2"></script>
  <script src="/js/auth.js?v=2"></script>
  <script src="/js/feed.js?v=2"></script>
  <script src="/js/reader.js?v=2"></script>
  <script src="/js/app.js?v=3"></script>
</body>
</html>
